<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ethos</title>
    <style>#root { opacity: 0; }</style>
  </head>
  <body>
    <script>
      // Apply dark mode before first paint to prevent flash
      (function() {
        var stored = localStorage.getItem('ethos_dark');
        var dark = stored !== null ? stored === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) {
          document.documentElement.classList.add('dark');
          document.body.style.backgroundColor = '#1C1917';
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
